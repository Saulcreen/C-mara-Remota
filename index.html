<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CamLink — Cámara Remota</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00f5a0;
    --accent2: #00d9f5;
    --warn: #f5a000;
    --red: #f54060;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --radius: 12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,160,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,160,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    width: 100%; max-width: 980px;
    padding: 24px 16px;
    display: flex; flex-direction: column;
    align-items: center; gap: 18px;
  }

  header { text-align: center; }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 6px; opacity: 0.8;
  }

  h1 {
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 12px; color: var(--muted);
    font-family: 'Space Mono', monospace; margin-top: 4px;
  }

  /* SETUP */
  .role-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px 28px;
    width: 100%; max-width: 540px;
    display: flex; flex-direction: column; gap: 18px;
    box-shadow: 0 0 40px rgba(0,245,160,0.04);
  }

  .role-title {
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .role-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .role-btn {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: transparent; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
    padding: 18px 12px; cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    position: relative; overflow: hidden;
  }
  .role-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity 0.2s;
  }
  .role-btn:hover::before { opacity: 0.07; }
  .role-btn.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,245,160,0.15); }
  .role-btn.active::before { opacity: 0.1; }
  .role-btn .icon { font-size: 26px; position: relative; z-index: 1; }
  .role-btn > span { position: relative; z-index: 1; font-size: 13px; }
  .role-btn .desc {
    font-size: 9px; color: var(--muted);
    font-family: 'Space Mono', monospace; font-weight: 400;
    position: relative; z-index: 1;
  }

  .room-row { display: flex; gap: 8px; }

  .room-input {
    flex: 1; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 14px; padding: 11px 14px; outline: none;
    transition: border-color 0.2s; letter-spacing: 2px;
  }
  .room-input:focus { border-color: var(--accent); }
  .room-input::placeholder { color: var(--muted); letter-spacing: 1px; }

  .btn {
    border: none; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    padding: 11px 18px; cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,245,160,0.3); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 12px;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost.active { border-color: var(--accent); color: var(--accent); background: rgba(0,245,160,0.08); }
  .btn-danger {
    background: rgba(245,64,96,0.12); border: 1px solid rgba(245,64,96,0.35);
    color: var(--red);
  }
  .btn-danger:hover { background: rgba(245,64,96,0.22); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 11px; border-radius: 20px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; border: 1px solid;
  }
  .status-badge.idle { border-color: var(--border); color: var(--muted); }
  .status-badge.waiting { border-color: var(--warn); color: var(--warn); }
  .status-badge.connected { border-color: var(--accent); color: var(--accent); }
  .status-badge.error { border-color: var(--red); color: var(--red); }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .dot.pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  /* VIDEO AREA */
  .video-area { display: none; width: 100%; flex-direction: column; gap: 12px; }
  .video-area.visible { display: flex; }

  .video-grid { display: grid; gap: 12px; width: 100%; }
  .video-grid.single { grid-template-columns: 1fr; }
  .video-grid.dual { grid-template-columns: 1fr 1fr; }
  @media (max-width: 580px) { .video-grid.dual { grid-template-columns: 1fr; } }

  /*
   * VIDEO WRAPPER
   * — fondo negro puro
   * — overflow hidden para clip al rotar/zoom
   * — NO usar filter ni backdrop-filter aquí (degrada video)
   */
  .video-wrap {
    position: relative;
    background: #000;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 16/9;
  }

  /*
   * VIDEO ELEMENT
   * Claves de nitidez:
   *  - width/height 100% con object-fit: cover (no contain — contain deja
   *    barras negras y el navegador re-escala con antialiasing agresivo)
   *  - image-rendering: high-quality  <- le dice al compositor que no degrade
   *  - NO will-change (activa un compositor separado con baja calidad)
   *  - NO filter CSS
   *  - transform SOLO vía --vid-transform para no tocar el layout
   */
  .video-wrap video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    background: #000;
    image-rendering: high-quality;
    /* transform se aplica por JS vía style.transform */
    transform-origin: center center;
    /* Forzar GPU compositing limpio, sin filtros del browser */
    -webkit-transform: translateZ(0);
    -webkit-filter: none;
    filter: none;
  }

  /* Video remoto: máxima nitidez posible en el receptor */
  #remoteVideo {
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    image-rendering: high-quality;
  }

  .video-label {
    position: absolute; top: 9px; left: 9px;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 5px; padding: 3px 9px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    z-index: 5; pointer-events: none;
  }

  .video-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: var(--muted); z-index: 2; background: #000;
  }
  .video-placeholder .big-icon { font-size: 36px; opacity: 0.3; }
  .video-placeholder p { font-size: 10px; font-family: 'Space Mono', monospace; letter-spacing: 1px; }

  /* Freeze overlay */
  .freeze-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(10,10,15,0.7);
    align-items: center; justify-content: center;
    z-index: 9; flex-direction: column; gap: 6px;
  }
  .freeze-overlay.show { display: flex; }
  .freeze-overlay span { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--warn); letter-spacing: 1px; }

  /* Scan line — thin, low opacity para no tapar imagen */
  .scan-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,245,160,0.5), transparent);
    animation: scan 4s linear infinite;
    pointer-events: none; z-index: 3;
  }
  @keyframes scan { 0%{top:0%} 100%{top:100%} }

  /* FS button */
  .fs-btn {
    position: absolute; bottom: 7px; right: 7px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 5px;
    color: var(--muted); cursor: pointer;
    padding: 4px 6px; font-size: 13px; line-height: 1;
    transition: color 0.15s; z-index: 6;
  }
  .fs-btn:hover { color: var(--accent); border-color: rgba(0,245,160,0.4); }

  /* VIEWER TRANSFORM CONTROLS */
  .viewer-controls {
    display: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    gap: 14px; align-items: center; flex-wrap: wrap; width: 100%;
  }
  .viewer-controls.show { display: flex; }

  .ctrl-group { display: flex; align-items: center; gap: 6px; }
  .ctrl-label {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted); min-width: 42px;
  }

  .ctrl-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text);
    cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; user-select: none;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,245,160,0.05); }
  .ctrl-btn.active { border-color: var(--accent); background: rgba(0,245,160,0.12); color: var(--accent); }

  .zoom-display {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--accent); min-width: 34px; text-align: center;
  }

  /* CAMERA quality selector */
  .quality-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .quality-btn {
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    letter-spacing: 1px;
  }
  .quality-btn:hover { border-color: var(--accent); color: var(--accent); }
  .quality-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,245,160,0.08); }

  .controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  .log-area {
    width: 100%; max-width: 540px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    max-height: 80px; overflow-y: auto;
  }
  .log-line {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--muted); line-height: 1.7;
    display: flex; gap: 8px;
  }
  .log-line .ts { color: #252540; }
  .log-line.ok .msg { color: var(--accent); }
  .log-line.warn .msg { color: var(--warn); }
  .log-line.err .msg { color: var(--red); }

  @media (max-width: 480px) {
    .role-buttons { grid-template-columns: 1fr; }
    .role-card { padding: 18px; }
  }

  .fade-in { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="app">
  <header>
    <p class="logo">◈ CamLink</p>
    <h1>Cámara Remota</h1>
    <p class="subtitle">// WebRTC peer-to-peer</p>
  </header>

  <!-- Setup -->
  <div class="role-card fade-in" id="setupCard">
    <p class="role-title">// 01 — Elige tu rol</p>
    <div class="role-buttons">
      <button class="role-btn" id="btnViewer" onclick="selectRole('viewer')">
        <span class="icon">🖥️</span>
        <span>Espectador</span>
        <span class="desc">Ver la cámara remota</span>
      </button>
      <button class="role-btn" id="btnCamera" onclick="selectRole('camera')">
        <span class="icon">📷</span>
        <span>Cámara</span>
        <span class="desc">Transmitir mi cámara</span>
      </button>
    </div>

    <!-- Quality selector (shown only for camera role) -->
    <div id="qualityRow" style="display:none">
      <p class="role-title" style="margin-bottom:8px">// 02 — Calidad de transmisión</p>
      <div class="quality-row">
        <button class="quality-btn" onclick="setQuality('low')">Baja<br><span style="font-size:8px;opacity:.6">480p · fluido</span></button>
        <button class="quality-btn active" id="qMed" onclick="setQuality('medium')">Media<br><span style="font-size:8px;opacity:.6">720p · recomendado</span></button>
        <button class="quality-btn" onclick="setQuality('high')">Alta<br><span style="font-size:8px;opacity:.6">1080p · necesita WiFi</span></button>
      </div>
    </div>

    <p class="role-title">// 03 — Código de sala</p>
    <div class="room-row">
      <input class="room-input" id="roomInput" placeholder="ej: SALA-7342" maxlength="20" />
      <button class="btn btn-ghost" onclick="genRoom()">🎲</button>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
      <span class="status-badge idle" id="statusBadge">
        <span class="dot"></span><span id="statusText">esperando</span>
      </span>
      <button class="btn btn-primary" id="connectBtn" onclick="startConnection()" disabled>
        Conectar →
      </button>
    </div>
  </div>

  <!-- Video Area -->
  <div class="video-area" id="videoArea">
    <div class="video-grid single" id="videoGrid">

      <!-- Remote (what viewer sees) -->
      <div class="video-wrap" id="remoteWrap">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="video-label" id="remoteLabel">cámara remota</div>
        <div class="video-placeholder" id="remotePlaceholder">
          <span class="big-icon">📡</span><p>esperando stream...</p>
        </div>
        <div class="freeze-overlay" id="freezeOverlay">
          <span style="font-size:20px">⚠️</span>
          <span>reconectando stream...</span>
        </div>
        <div class="scan-line" id="scanLine" style="display:none"></div>
        <button class="fs-btn" onclick="toggleFS('remoteVideo')">⛶</button>
      </div>

      <!-- Local preview (camera side) -->
      <div class="video-wrap" id="localWrap" style="display:none">
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="video-label">mi cámara</div>
        <button class="fs-btn" onclick="toggleFS('localVideo')">⛶</button>
      </div>
    </div>

    <!-- Viewer transform controls -->
    <div class="viewer-controls" id="viewerControls">
      <div class="ctrl-group">
        <span class="ctrl-label">Rotar</span>
        <button class="ctrl-btn" onclick="rotateLeft()" title="−90°">↺</button>
        <button class="ctrl-btn" id="btnFlip" onclick="flipVideo()" title="Espejo">⇆</button>
        <button class="ctrl-btn" onclick="rotateRight()" title="+90°">↻</button>
        <button class="ctrl-btn" onclick="resetTransform()" title="Reset">✕</button>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Zoom</span>
        <button class="ctrl-btn" onclick="changeZoom(-0.25)">−</button>
        <span class="zoom-display" id="zoomDisplay">1×</span>
        <button class="ctrl-btn" onclick="changeZoom(+0.25)">＋</button>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-ghost" id="muteBtn" onclick="toggleMic()" style="display:none">🎤 Mic</button>
      <button class="btn btn-ghost" id="camSwitchBtn" onclick="switchCamera()" style="display:none">🔄 Cámara</button>
      <button class="btn btn-danger" onclick="disconnect()">✕ Salir</button>
    </div>
  </div>

  <div class="log-area" id="logArea"></div>
</div>

<script>
const PEERJS_CDN = 'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';

// ─── STATE ────────────────────────────────────────────────────────────────────
let role = null, peer = null, call = null, localStream = null;
let facingMode = 'environment', micActive = true;
let selectedQuality = 'medium';

// Viewer transform
let rotation = 0, zoomLevel = 1.0, flipped = false, panX = 0, panY = 0;
let isDragging = false, dragSX, dragSY, panSX, panSY;

// Freeze / reconnect
let freezeInterval = null, lastVideoTime = -1, frozenTicks = 0;
let retryTimer = null, callRetryTimer = null;
let streamActive = false;

// Quality profiles — balancing sharpness vs CPU/network
const QUALITY = {
  low:    { width: 640,  height: 480,  frameRate: 20 },
  medium: { width: 1280, height: 720,  frameRate: 25 },
  high:   { width: 1920, height: 1080, frameRate: 30 }
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
function log(msg, type='') {
  const a = document.getElementById('logArea');
  const d = new Date();
  const ts = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
  const l = document.createElement('div');
  l.className = `log-line ${type}`;
  l.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
  a.appendChild(l);
  a.scrollTop = a.scrollHeight;
  while (a.children.length > 40) a.removeChild(a.firstChild);
}

function setStatus(text, type='idle') {
  const b = document.getElementById('statusBadge');
  b.className = `status-badge ${type}`;
  document.getElementById('statusText').textContent = text;
  const d = b.querySelector('.dot');
  d.className = `dot ${(type==='waiting'||type==='connected') ? 'pulse' : ''}`;
}

function genRoom() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = '';
  for (let i = 0; i < 8; i++) { if(i===4) id+='-'; id += c[Math.floor(Math.random()*c.length)]; }
  document.getElementById('roomInput').value = id;
  checkReady();
}

function selectRole(r) {
  role = r;
  document.getElementById('btnViewer').classList.toggle('active', r==='viewer');
  document.getElementById('btnCamera').classList.toggle('active', r==='camera');
  document.getElementById('qualityRow').style.display = r==='camera' ? 'block' : 'none';
  checkReady();
  log(`Rol: ${r==='viewer' ? 'Espectador' : 'Cámara'}`);
}

function setQuality(q) {
  selectedQuality = q;
  document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  log(`Calidad seleccionada: ${q} (${QUALITY[q].width}×${QUALITY[q].height})`);
}

function checkReady() {
  const room = document.getElementById('roomInput').value.trim();
  document.getElementById('connectBtn').disabled = !(role && room.length >= 3);
}
document.getElementById('roomInput').addEventListener('input', checkReady);

// ─── PEERJS ──────────────────────────────────────────────────────────────────
function loadPeerJS(cb) {
  if (window.Peer) { cb(); return; }
  const s = document.createElement('script');
  s.src = PEERJS_CDN;
  s.onload = cb;
  s.onerror = () => { log('Error cargando PeerJS', 'err'); setStatus('error','error'); };
  document.head.appendChild(s);
}

// ─── START ────────────────────────────────────────────────────────────────────
function startConnection() {
  const room = document.getElementById('roomInput').value.trim().toUpperCase().replace(/[^A-Z0-9-]/g,'');
  if (!room || !role) return;

  document.getElementById('connectBtn').disabled = true;
  setStatus('conectando...','waiting');
  log('Iniciando WebRTC...');

  loadPeerJS(() => {
    const myId    = `cl2-${room}-${role==='viewer'?'V':'C'}`;
    const otherId = `cl2-${room}-${role==='viewer'?'C':'V'}`;

    peer = new Peer(myId, {
      debug: 0,
      config: { iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]}
    });

    peer.on('open', () => {
      log('Servidor de señalización OK', 'ok');
      showVideoArea();
      if (role === 'camera') startCamera(otherId);
      else { setStatus('esperando cámara...','waiting'); listenForCall(); }
    });

    peer.on('error', err => {
      if (err.type === 'unavailable-id') {
        peer.destroy();
        peer = new Peer(myId + '-' + (Date.now()%9999), { debug:0 });
        peer.on('open', () => {
          if (role==='camera') startCamera(otherId); else listenForCall();
        });
      } else if (err.type === 'peer-unavailable') {
        clearTimeout(callRetryTimer);
        callRetryTimer = setTimeout(() => { if (role==='camera'&&localStream) callViewer(otherId); }, 5000);
      } else {
        log(`Error: ${err.type}`, 'err');
      }
    });

    peer.on('disconnected', () => {
      log('Señalización caída, reconectando...','warn');
      setStatus('reconectando...','waiting');
      setTimeout(() => { if(peer&&!peer.destroyed) peer.reconnect(); }, 2500);
    });
  });
}

// ─── CAMERA ───────────────────────────────────────────────────────────────────
async function startCamera(viewerPeerId) {
  setStatus('iniciando cámara...','waiting');
  const q = QUALITY[selectedQuality];
  log(`Abriendo cámara ${q.width}×${q.height} @ ${q.frameRate}fps...`);

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode,
        width:     { exact: q.width  },
        height:    { exact: q.height },
        frameRate: { exact: q.frameRate }
      },
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 44100 }
    }).catch(() =>
      // Fallback: sin exact, el navegador elige lo más cercano
      navigator.mediaDevices.getUserMedia({
        video: {
          facingMode,
          width:     { ideal: q.width  },
          height:    { ideal: q.height },
          frameRate: { ideal: q.frameRate }
        },
        audio: true
      })
    );

    const vt = localStream.getVideoTracks()[0];
    const s  = vt.getSettings();
    log(`Cámara lista: ${s.width}×${s.height} @ ${Math.round(s.frameRate||q.frameRate)}fps`, 'ok');

    // ── Reducir carga del móvil:
    //    apagar procesamiento de imagen innecesario en el track
    if (vt.applyConstraints) {
      vt.applyConstraints({
        advanced: [{ torch: false }]
      }).catch(()=>{});
    }

    document.getElementById('localVideo').srcObject = localStream;
    document.getElementById('localWrap').style.display = 'block';
    document.getElementById('muteBtn').style.display = 'inline-flex';
    document.getElementById('camSwitchBtn').style.display = 'inline-flex';
    document.getElementById('videoGrid').className = 'video-grid dual';

    setStatus('llamando...','waiting');
    callViewer(viewerPeerId);

    // También escucha si el viewer llama (race condition)
    peer.on('call', inCall => {
      log('Llamada entrante, respondiendo...','ok');
      inCall.answer(localStream);
      handleCall(inCall);
      // Forzar bitrate también desde este lado
      setTimeout(() => forceBitrate(inCall.peerConnection), 1500);
    });

  } catch(e) {
    log(`Error cámara: ${e.message}`, 'err');
    setStatus('error','error');
    alert('No se pudo acceder a la cámara.\nAsegúrate de estar en HTTPS y haber dado permisos.');
  }
}

function callViewer(viewerPeerId) {
  if (!peer||peer.destroyed||!localStream) return;
  clearTimeout(callRetryTimer);

  log('Llamando al espectador...');
  const outCall = peer.call(viewerPeerId, localStream);
  if (!outCall) {
    callRetryTimer = setTimeout(() => callViewer(viewerPeerId), 5000);
    return;
  }

  handleCall(outCall);

  const noAns = setTimeout(() => {
    log('Sin respuesta, reintentando...','warn');
    callViewer(viewerPeerId);
  }, 12000);

  outCall.on('stream', () => clearTimeout(noAns));
  outCall.on('error',  () => { clearTimeout(noAns); callRetryTimer = setTimeout(()=>callViewer(viewerPeerId),4000); });
  outCall.on('close',  () => { clearTimeout(noAns); callRetryTimer = setTimeout(()=>callViewer(viewerPeerId),3000); });
}

// ─── FORZAR CALIDAD EN EL RECEPTOR (viewer) ──────────────────────────────────
// El navegador del espectador puede degradar el video entrante por CPU/red.
// Estos ajustes le dicen al RTCPeerConnection que no escale hacia abajo.
async function forceReceiverQuality(pc) {
  if (!pc) return;

  // 1) Deshabilitar cualquier reducción de resolución en receivers
  for (const receiver of pc.getReceivers()) {
    if (!receiver.track || receiver.track.kind !== 'video') continue;
    try {
      // Algunos navegadores exponen setParameters en receivers también
      if (typeof receiver.setParameters === 'function') {
        const params = receiver.getParameters ? receiver.getParameters() : {};
        if (!params.encodings) params.encodings = [{}];
        params.encodings.forEach(enc => {
          enc.networkPriority = 'high';
          enc.priority = 'high';
        });
        await receiver.setParameters(params).catch(() => {});
      }
    } catch (_) {}
  }

  // 2) Forzar resolución de decodificación via SDP renegociación (answer lado viewer)
  //    Aumentar el presupuesto de CPU de decodificación
  try {
    const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
    // Aumentar b=AS en el SDP de recepción
    const patched = offer.sdp.replace(
      /(m=video[\s\S]*?)(a=)/,
      '$1b=AS:8000\r\nb=TIAS:8000000\r\n$2'
    );
    await pc.setLocalDescription({ type: offer.type, sdp: patched }).catch(() => {});
  } catch (_) {}

  log('Calidad de recepción maximizada ✓', 'ok');
}

// ─── MEJORAR BUFFER DEL VIDEO ELEMENT ────────────────────────────────────────
function optimizeVideoElement(vid) {
  // Reducir el jitter buffer para menos latencia y mejor nitidez
  if (vid.jitterBufferDelay !== undefined) {
    try { vid.jitterBufferDelay = 0.05; } catch (_) {}
  }
  // Forzar decodificación de alta prioridad
  if ('requestVideoFrameCallback' in vid) {
    const keepSharp = () => {
      if (vid.srcObject) vid.requestVideoFrameCallback(keepSharp);
    };
    vid.requestVideoFrameCallback(keepSharp);
  }
}

// Fuerza bitrate máximo en todos los senders de video del RTCPeerConnection
// Usa setParameters (estándar W3C) + parche SDP como fallback
async function forceBitrate(pc) {
  if (!pc) return;

  // — Método 1: RTCRtpSender.setParameters (Chrome, Firefox, Safari modernos)
  for (const sender of pc.getSenders()) {
    if (!sender.track || sender.track.kind !== 'video') continue;
    try {
      const params = sender.getParameters();
      if (!params.encodings || params.encodings.length === 0) {
        params.encodings = [{}];
      }
      params.encodings.forEach(enc => {
        enc.maxBitrate       = 8_000_000;  // 8 Mbps techo
        enc.minBitrate       = 1_000_000;  // 1 Mbps mínimo — evita pixelado
        enc.networkPriority  = 'high';
        enc.priority         = 'high';
        // NO tocar scaleResolutionDownBy — dejaría 1 (sin escalar)
      });
      await sender.setParameters(params);
      log('Bitrate forzado: 1–8 Mbps ✓', 'ok');
    } catch(e) {
      log(`setParameters falló (${e.message}), usando SDP patch`, 'warn');
    }
  }

  // — Método 2: parche directo al SDP (fallback para navegadores viejos)
  //   Modifica la sesión activa renegociando con bitrate aumentado
  try {
    const offer = await pc.createOffer();
    // Insertar b=AS (kbps) y b=TIAS (bps) en la sección de video del SDP
    const sdpPatched = offer.sdp
      .replace(/(m=video[\s\S]*?)(a=)/,
        '$1b=AS:8000\r\nb=TIAS:8000000\r\n$2');
    await pc.setLocalDescription({ type: offer.type, sdp: sdpPatched });
  } catch(_) { /* silencioso — el método 1 ya lo cubre */ }
}

// ─── VIEWER ───────────────────────────────────────────────────────────────────
function listenForCall() {
  peer.off('call');
  peer.on('call', inCall => {
    log('Cámara conectada, respondiendo...','ok');
    inCall.answer();
    handleCall(inCall);
  });
}

// ─── HANDLE CALL ─────────────────────────────────────────────────────────────
function handleCall(c) {
  call = c;

  c.on('stream', remoteStream => {
    log('Stream recibido ✓','ok');
    setStatus('conectado','connected');
    streamActive = true;

    // Forzar bitrate alto en cuanto el peer connection esté listo
    if (c.peerConnection) {
      // Pequeño delay para que ICE termine de negociar
      setTimeout(() => forceBitrate(c.peerConnection), 1500);
    }

    const vid = document.getElementById('remoteVideo');
    vid.srcObject = null;
    vid.srcObject = remoteStream;
    vid.setAttribute('playsinline', '');
    vid.setAttribute('webkit-playsinline', '');
    vid.play().catch(()=>{});

    // Forzar calidad de recepción en el viewer (no toca la cámara)
    if (role === 'viewer' && c.peerConnection) {
      setTimeout(() => forceReceiverQuality(c.peerConnection), 1500);
      setTimeout(() => forceReceiverQuality(c.peerConnection), 4000);
    }
    optimizeVideoElement(vid);

    document.getElementById('remotePlaceholder').style.display = 'none';
    document.getElementById('freezeOverlay').classList.remove('show');
    document.getElementById('scanLine').style.display = 'block';
    document.getElementById('remoteLabel').textContent = '📷 en vivo';

    if (role === 'viewer') {
      document.getElementById('viewerControls').classList.add('show');
      setupDragPan();
    }

    startFreezeDetection(vid, remoteStream);
    applyTransform();
  });

  c.on('close', () => { streamActive = false; stopFreezeDetection(); onStreamLost(); });
  c.on('error', () => { streamActive = false; stopFreezeDetection(); onStreamLost(); });
}

function onStreamLost() {
  log('Stream perdido, esperando reconexión...','warn');
  setStatus('reconectando...','waiting');
  document.getElementById('remotePlaceholder').style.display = 'flex';
  document.getElementById('scanLine').style.display = 'none';
  document.getElementById('freezeOverlay').classList.remove('show');
  document.getElementById('remoteVideo').srcObject = null;
  clearTimeout(retryTimer);
  if (role === 'viewer') retryTimer = setTimeout(listenForCall, 2000);
}

// ─── FREEZE DETECTION ────────────────────────────────────────────────────────
function startFreezeDetection(vid, stream) {
  stopFreezeDetection();
  lastVideoTime = -1; frozenTicks = 0;

  freezeInterval = setInterval(() => {
    if (!vid.srcObject || vid.paused) return;

    if (vid.readyState >= 2) {
      const ct = vid.currentTime;
      if (ct === lastVideoTime && lastVideoTime >= 0) {
        frozenTicks++;
        if (frozenTicks === 5) {
          // 5s congelado: mostrar aviso
          document.getElementById('freezeOverlay').classList.add('show');
          log('Stream congelado, reiniciando decoder...','warn');
        }
        if (frozenTicks === 5) {
          // Flush del decoder
          const s = vid.srcObject;
          vid.srcObject = null;
          setTimeout(() => { if(s){ vid.srcObject = s; vid.play().catch(()=>{}); document.getElementById('freezeOverlay').classList.remove('show'); } }, 1200);
        }
      } else {
        if (frozenTicks > 0) document.getElementById('freezeOverlay').classList.remove('show');
        frozenTicks = 0;
      }
      lastVideoTime = ct;
    }
  }, 1000);
}

function stopFreezeDetection() {
  if (freezeInterval) { clearInterval(freezeInterval); freezeInterval = null; }
}

// ─── TRANSFORM (viewer) ──────────────────────────────────────────────────────
/*
 * Aplicamos transform SÓLO al <video>, nunca al wrapper.
 * Así el compositing de video queda sin interferencia de CSS externos.
 * Se usa translate3d para activar la GPU sin degradar el video.
 */
function applyTransform() {
  const vid  = document.getElementById('remoteVideo');
  const wrap = document.getElementById('remoteWrap');

  // Ajustar aspect-ratio del wrapper cuando el video está girado 90/270
  wrap.style.aspectRatio = (rotation===90||rotation===270) ? '9/16' : '16/9';

  const fx = flipped ? -1 : 1;
  // translate3d en lugar de translate para mantener sub-pixel rendering
  vid.style.transform = `rotate(${rotation}deg) scaleX(${fx}) scale(${zoomLevel}) translate3d(${panX}px,${panY}px,0)`;

  document.getElementById('zoomDisplay').textContent =
    (zoomLevel === Math.floor(zoomLevel) ? zoomLevel : zoomLevel.toFixed(2)) + '×';
}

function rotateLeft()  { rotation=(rotation-90+360)%360; panX=panY=0; applyTransform(); log(`Rotado: ${rotation}°`); }
function rotateRight() { rotation=(rotation+90)%360;      panX=panY=0; applyTransform(); log(`Rotado: ${rotation}°`); }
function flipVideo()   {
  flipped=!flipped;
  document.getElementById('btnFlip').classList.toggle('active',flipped);
  applyTransform();
}
function changeZoom(d) {
  zoomLevel = Math.max(0.5, Math.min(4.0, Math.round((zoomLevel+d)*100)/100));
  if (zoomLevel<=1) { panX=panY=0; }
  applyTransform();
}
function resetTransform() {
  rotation=0; zoomLevel=1; flipped=false; panX=panY=0;
  document.getElementById('btnFlip').classList.remove('active');
  applyTransform();
}

// Drag pan (sólo cuando zoom > 1)
function setupDragPan() {
  const wrap = document.getElementById('remoteWrap');
  if (wrap._dragInit) return;
  wrap._dragInit = true;

  const getXY = e => e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY};

  wrap.addEventListener('mousedown',  e=>{ if(zoomLevel>1){isDragging=true; const p=getXY(e); dragSX=p.x;dragSY=p.y;panSX=panX;panSY=panY; e.preventDefault(); }});
  wrap.addEventListener('touchstart', e=>{ if(zoomLevel>1&&e.touches.length===1){isDragging=true; const p=getXY(e); dragSX=p.x;dragSY=p.y;panSX=panX;panSY=panY;} }, {passive:true});

  document.addEventListener('mousemove',  e=>{ if(!isDragging) return; const p=getXY(e); panX=panSX+(p.x-dragSX); panY=panSY+(p.y-dragSY); applyTransform(); });
  document.addEventListener('touchmove',  e=>{ if(!isDragging) return; const p=getXY(e); panX=panSX+(p.x-dragSX); panY=panSY+(p.y-dragSY); applyTransform(); }, {passive:true});
  document.addEventListener('mouseup',  ()=>isDragging=false);
  document.addEventListener('touchend', ()=>isDragging=false);

  // Pinch zoom
  let lastPinchDist = 0;
  wrap.addEventListener('touchstart', e=>{ if(e.touches.length===2) lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }, {passive:true});
  wrap.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      zoomLevel=Math.max(0.5,Math.min(4,zoomLevel+(d-lastPinchDist)*0.008));
      lastPinchDist=d; applyTransform();
    }
  }, {passive:true});
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function showVideoArea() {
  document.getElementById('setupCard').style.display = 'none';
  document.getElementById('videoArea').classList.add('visible','fade-in');
}

function disconnect() {
  stopFreezeDetection();
  clearTimeout(retryTimer); clearTimeout(callRetryTimer);
  if (localStream) localStream.getTracks().forEach(t=>t.stop());
  if (call)  try{call.close()}catch(e){}
  if (peer)  try{peer.destroy()}catch(e){}
  localStream=null; peer=null; call=null; streamActive=false;

  document.getElementById('videoArea').classList.remove('visible');
  document.getElementById('setupCard').style.display = 'block';
  document.getElementById('connectBtn').disabled = false;
  document.getElementById('localWrap').style.display = 'none';
  document.getElementById('videoGrid').className = 'video-grid single';
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('remoteVideo').style.transform = '';
  document.getElementById('localVideo').srcObject  = null;
  document.getElementById('remotePlaceholder').style.display = 'flex';
  document.getElementById('scanLine').style.display = 'none';
  document.getElementById('freezeOverlay').classList.remove('show');
  document.getElementById('muteBtn').style.display = 'none';
  document.getElementById('camSwitchBtn').style.display = 'none';
  document.getElementById('viewerControls').classList.remove('show');
  document.getElementById('remoteWrap').style.aspectRatio = '16/9';

  rotation=0; zoomLevel=1; flipped=false; panX=panY=0;
  setStatus('esperando','idle');
  log('Desconectado.');
}

function toggleMic() {
  if (!localStream) return;
  const a = localStream.getAudioTracks()[0];
  if (!a) return;
  micActive = !micActive; a.enabled = micActive;
  document.getElementById('muteBtn').textContent = micActive ? '🎤 Mic' : '🔇 Mute';
}

async function switchCamera() {
  if (!localStream) return;
  facingMode = facingMode==='environment' ? 'user' : 'environment';
  const q = QUALITY[selectedQuality];
  log(`Cambiando a cámara ${facingMode==='environment'?'trasera':'frontal'}...`);

  const ns = await navigator.mediaDevices.getUserMedia({
    video: { facingMode, width:{ideal:q.width}, height:{ideal:q.height}, frameRate:{ideal:q.frameRate} },
    audio: { echoCancellation:true, noiseSuppression:true }
  }).catch(e=>{ log(`Error al cambiar cámara: ${e.message}`,'err'); return null; });

  if (!ns) return;
  localStream.getTracks().forEach(t=>t.stop());
  localStream = ns;
  document.getElementById('localVideo').srcObject = localStream;

  if (call?.peerConnection) {
    const sender = call.peerConnection.getSenders().find(s=>s.track?.kind==='video');
    if (sender) await sender.replaceTrack(localStream.getVideoTracks()[0]).catch(()=>{});
  }
  log('Cámara cambiada','ok');
}

function toggleFS(id) {
  const v = document.getElementById(id);
  if (!document.fullscreenElement) {
    (v.requestFullscreen||v.webkitRequestFullscreen||v.mozRequestFullScreen).call(v).catch(()=>{});
  } else {
    document.exitFullscreen().catch(()=>{});
  }
}

log('CamLink listo — elige rol y código de sala.');
